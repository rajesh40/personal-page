<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 980" role="img" aria-labelledby="title desc">
  <title id="title">iCargo dashboard wireframe with project links and tech navigation</title>
  <desc id="desc">Wireframe showing iCargo as the main product, visible detail links for each project block, and clickable tech names.</desc>
  <defs>
    <style>
      .bg { fill: #fbfcff; }
      .frame { fill: none; stroke: #111827; stroke-width: 10; }
      .card { fill: #ffffff; stroke: #111827; stroke-width: 8; rx: 18; ry: 18; }
      .soft { fill: #f7f9fc; }
      .mini { fill: #ffffff; stroke: #111827; stroke-width: 7; rx: 12; ry: 12; }
      .line { stroke: #111827; stroke-width: 6; fill: none; stroke-linecap: round; }
      .title { font: 700 26px Arial, sans-serif; fill: #111827; }
      .text { font: 600 20px Arial, sans-serif; fill: #111827; }
      .small { font: 600 16px Arial, sans-serif; fill: #111827; }
      .muted { font: 600 14px Arial, sans-serif; fill: #475569; }
      .note { font: 700 18px Arial, sans-serif; fill: #0f4c81; }
      .stack { fill: #eef4ff; stroke: #111827; stroke-width: 6; rx: 16; ry: 16; }
      .linkbox { fill: #eef4ff; stroke: #111827; stroke-width: 4; rx: 10; ry: 10; }
      .linktext { font: 700 14px Arial, sans-serif; fill: #0f4c81; text-decoration: underline; }
      .techbox { fill: #ffffff; stroke: #111827; stroke-width: 4; rx: 12; ry: 12; }
      .techtext { font: 700 15px Arial, sans-serif; fill: #0f4c81; }
      .legend { fill: #ffffff; stroke: #111827; stroke-width: 6; rx: 16; ry: 16; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1480" height="980" />
  <rect class="frame" x="18" y="18" width="1444" height="944" />

  <text class="title" x="60" y="72">What I understand you want</text>
  <text class="small" x="60" y="102">One dashboard page. Main product first. Every project has a detail link. Tech names are clickable.</text>

  <g id="icargo-card">
    <rect class="card soft" x="320" y="120" width="760" height="200" />
    <text class="title" x="700" y="168" text-anchor="middle">iCargo</text>
    <text class="small" x="700" y="196" text-anchor="middle">main product / main dashboard</text>

    <a href="bagging.html">
      <rect class="mini" x="352" y="146" width="92" height="82" />
      <text class="text" x="398" y="193" text-anchor="middle">bag</text>
    </a>

    <a href="vehicle-inspection.html">
      <rect class="mini" x="470" y="146" width="106" height="82" />
      <text class="text" x="523" y="193" text-anchor="middle">vehicle</text>
    </a>

    <a href="rule-manager.html">
      <rect class="mini" x="602" y="146" width="96" height="82" />
      <text class="text" x="650" y="193" text-anchor="middle">rules</text>
    </a>

    <a href="order-integrations.html">
      <rect class="mini" x="724" y="146" width="110" height="82" />
      <text class="text" x="779" y="193" text-anchor="middle">orders</text>
    </a>

    <a href="#detail-icargo-customer">
      <rect class="mini" x="345" y="244" width="710" height="50" />
      <text class="text" x="700" y="275" text-anchor="middle">customer side project / icargo_customer</text>
    </a>

    <a href="#detail-icargo">
      <rect class="linkbox" x="886" y="144" width="150" height="36" />
      <text class="linktext" x="961" y="167" text-anchor="middle">detail page</text>
    </a>
  </g>

  <g id="parcel-api-card">
    <rect class="card" x="1185" y="98" width="170" height="220" />
    <text class="title" x="1270" y="165" text-anchor="middle">parcel-api</text>
    <text class="small" x="1270" y="194" text-anchor="middle">shared backend</text>
    <a href="#detail-parcel-api">
      <rect class="linkbox" x="1212" y="255" width="116" height="34" />
      <text class="linktext" x="1270" y="277" text-anchor="middle">detail page</text>
    </a>
  </g>

  <g id="route-manager-card">
    <rect class="card" x="88" y="345" width="290" height="345" />
    <text class="title" x="233" y="420" text-anchor="middle">route manager</text>
    <text class="small" x="233" y="450" text-anchor="middle">major module / revamp</text>
    <a href="#detail-route-manager">
      <rect class="linkbox" x="158" y="620" width="150" height="34" />
      <text class="linktext" x="233" y="642" text-anchor="middle">detail page</text>
    </a>
  </g>

  <g id="bagging-card">
    <a href="bagging.html">
      <rect class="card" x="492" y="388" width="180" height="255" />
      <text class="title" x="582" y="470" text-anchor="middle">bagging</text>
      <text class="small" x="582" y="500" text-anchor="middle">newer full-stack</text>
      <rect class="linkbox" x="527" y="575" width="110" height="34" />
      <text class="linktext" x="582" y="597" text-anchor="middle">detail page</text>
    </a>
  </g>

  <g id="linnworks-card">
    <rect class="card" x="970" y="282" width="170" height="250" />
    <text class="title" x="1055" y="360" text-anchor="middle">linnworks</text>
    <text class="small" x="1055" y="390" text-anchor="middle">integration</text>
    <a href="#detail-linnworks">
      <rect class="linkbox" x="999" y="468" width="112" height="34" />
      <text class="linktext" x="1055" y="490" text-anchor="middle">detail page</text>
    </a>
  </g>

  <g id="inventory-card">
    <rect class="card" x="88" y="720" width="290" height="235" />
    <text class="title" x="233" y="805" text-anchor="middle">inventory</text>
    <text class="title" x="233" y="838" text-anchor="middle">management</text>
    <a href="#detail-inventory-management">
      <rect class="linkbox" x="153" y="890" width="160" height="34" />
      <text class="linktext" x="233" y="912" text-anchor="middle">detail page</text>
    </a>
  </g>

  <g id="onboarding-card">
    <rect class="card" x="500" y="720" width="180" height="210" />
    <text class="title" x="590" y="805" text-anchor="middle">onboarding</text>
    <text class="small" x="590" y="835" text-anchor="middle">workflow module</text>
    <a href="#detail-onboarding">
      <rect class="linkbox" x="535" y="870" width="110" height="34" />
      <text class="linktext" x="590" y="892" text-anchor="middle">detail page</text>
    </a>
  </g>

  <g id="webhook-worker-card">
    <rect class="card" x="1190" y="690" width="180" height="240" />
    <text class="title" x="1280" y="775" text-anchor="middle">webhook</text>
    <text class="title" x="1280" y="808" text-anchor="middle">worker</text>
    <text class="small" x="1280" y="838" text-anchor="middle">modern backend</text>
    <a href="#detail-webhook-worker">
      <rect class="linkbox" x="1225" y="870" width="110" height="34" />
      <text class="linktext" x="1280" y="892" text-anchor="middle">detail page</text>
    </a>
  </g>

  <path class="line" d="M1080 188 L1180 188" />
  <path class="line" d="M320 218 L378 360" />
  <path class="line" d="M700 320 L582 388" />
  <path class="line" d="M870 320 L970 390" />
  <path class="line" d="M420 320 L233 720" />
  <path class="line" d="M645 320 L590 720" />
  <path class="line" d="M990 320 L1270 690" />

  <g id="tech-nav">
    <rect class="stack" x="840" y="610" width="280" height="220" />
    <text class="note" x="980" y="648" text-anchor="middle">click tech to jump</text>

    <a href="#bagging-card">
      <rect class="techbox" x="865" y="675" width="96" height="34" />
      <text class="techtext" x="913" y="697" text-anchor="middle">Next.js</text>
    </a>
    <a href="#webhook-worker-card">
      <rect class="techbox" x="982" y="675" width="92" height="34" />
      <text class="techtext" x="1028" y="697" text-anchor="middle">NestJS</text>
    </a>

    <a href="#bagging-card">
      <rect class="techbox" x="865" y="724" width="116" height="34" />
      <text class="techtext" x="923" y="746" text-anchor="middle">TypeScript</text>
    </a>
    <a href="#webhook-worker-card">
      <rect class="techbox" x="1000" y="724" width="76" height="34" />
      <text class="techtext" x="1038" y="746" text-anchor="middle">Redis</text>
    </a>

    <a href="#inventory-card">
      <rect class="techbox" x="865" y="773" width="82" height="34" />
      <text class="techtext" x="906" y="795" text-anchor="middle">Prisma</text>
    </a>
    <a href="#linnworks-card">
      <rect class="techbox" x="965" y="773" width="104" height="34" />
      <text class="techtext" x="1017" y="795" text-anchor="middle">TypeORM</text>
    </a>

    <a href="#route-manager-card">
      <rect class="techbox" x="865" y="822" width="108" height="34" />
      <text class="techtext" x="919" y="844" text-anchor="middle">Redux</text>
    </a>
    <a href="#parcel-api-card">
      <rect class="techbox" x="990" y="822" width="72" height="34" />
      <text class="techtext" x="1026" y="844" text-anchor="middle">PHP</text>
    </a>
  </g>

  <g id="detail-targets">
    <rect class="legend" x="690" y="855" width="435" height="90" />
    <text class="note" x="708" y="885">detail targets</text>
    <text class="muted" id="detail-icargo" x="708" y="908">iCargo -> planned page: icargo.html</text>
    <text class="muted" id="detail-icargo-customer" x="708" y="928">icargo_customer -> planned page: icargo-customer.html</text>
    <text class="muted" id="detail-parcel-api" x="918" y="908">parcel-api -> planned page: parcel-api.html</text>
    <text class="muted" id="detail-route-manager" x="918" y="928">route manager -> planned page: route-manager.html</text>
  </g>

  <g id="detail-targets-2">
    <rect class="legend" x="1138" y="855" width="300" height="90" />
    <text class="muted" id="detail-linnworks" x="1156" y="885">linnworks -> planned: linnworks.html</text>
    <text class="muted" id="detail-inventory-management" x="1156" y="905">inventory -> planned: inventory-management.html</text>
    <text class="muted" id="detail-onboarding" x="1156" y="925">onboarding -> planned: onboarding.html</text>
    <text class="muted" id="detail-webhook-worker" x="1156" y="945">webhook-worker -> planned: webhook-worker.html</text>
  </g>

  <text class="small" x="60" y="945">Existing public pages already link directly. Planned pages are named so the final dashboard can wire every block to a real detail page.</text>
</svg>
