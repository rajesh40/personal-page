<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 1040" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio dashboard wireframe with modules inside iCargo</title>
  <desc id="desc">Wireframe showing vehicle inspection, rule engine, and rate engine directly inside the main iCargo card. Bagging is shown below as an independent project. icargo_customer is a separate card inside the iCargo ecosystem, below parcel-api.</desc>
  <defs>
    <style>
      .bg { fill: #fbfcff; }
      .frame { fill: none; stroke: #111827; stroke-width: 10; }
      .group { fill: #f7f9fc; stroke: #111827; stroke-width: 8; rx: 24; ry: 24; }
      .card { fill: #ffffff; stroke: #111827; stroke-width: 7; rx: 18; ry: 18; }
      .module { fill: #ffffff; stroke: #111827; stroke-width: 6; rx: 14; ry: 14; }
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .sub { font: 600 18px Arial, sans-serif; fill: #111827; }
      .small { font: 600 15px Arial, sans-serif; fill: #475569; }
      .group-label { font: 700 18px Arial, sans-serif; fill: #0f4c81; }
      .chip { fill: #eef4ff; stroke: #111827; stroke-width: 3; rx: 10; ry: 10; }
      .chip-text { font: 700 12px Arial, sans-serif; fill: #0f4c81; }
      .linkbox { fill: #eef4ff; stroke: #111827; stroke-width: 4; rx: 10; ry: 10; }
      .linktext { font: 700 13px Arial, sans-serif; fill: #0f4c81; text-decoration: underline; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1560" height="1040" />
  <rect class="frame" x="18" y="18" width="1524" height="1004" />

  <text class="title" x="56" y="72">Modules moved inside iCargo</text>
  <text class="small" x="56" y="102">Vehicle inspection, rule engine, and rate engine are shown inside the iCargo card. Bagging is shown below as an independent project.</text>

  <text class="group-label" x="112" y="150">iCargo ecosystem</text>
  <rect class="group" x="86" y="170" width="1388" height="410" />

  <g id="icargo-card">
    <rect class="card" x="118" y="206" width="950" height="220" />
    <text class="title" x="593" y="246" text-anchor="middle">iCargo</text>
    <text class="sub" x="593" y="274" text-anchor="middle">main product / internal operations dashboard</text>
    <rect class="chip" x="510" y="288" width="90" height="28" />
    <text class="chip-text" x="555" y="306" text-anchor="middle">AngularJS</text>
    <rect class="chip" x="612" y="288" width="82" height="28" />
    <text class="chip-text" x="653" y="306" text-anchor="middle">Ops UI</text>
    <a href="icargo.html" target="_top">
      <rect class="linkbox" x="912" y="220" width="120" height="34" />
      <text class="linktext" x="972" y="242" text-anchor="middle">detail page</text>
    </a>

    <g id="vehicle-module">
