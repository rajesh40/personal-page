<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1520 980" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio dashboard wireframe with iCargo group and independent projects</title>
  <desc id="desc">Wireframe showing iCargo, icargo customer, and parcel-api as one related group, with route manager, inventory management, onboarding, bagging, linnworks, and webhook-worker as independent projects. Every card shows project name, tech, and detail link.</desc>
  <defs>
    <style>
      .bg { fill: #fbfcff; }
      .frame { fill: none; stroke: #111827; stroke-width: 10; }
      .group { fill: #f7f9fc; stroke: #111827; stroke-width: 8; rx: 22; ry: 22; }
      .card { fill: #ffffff; stroke: #111827; stroke-width: 7; rx: 18; ry: 18; }
      .line { stroke: #111827; stroke-width: 5; fill: none; stroke-linecap: round; }
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .sub { font: 600 18px Arial, sans-serif; fill: #111827; }
      .small { font: 600 15px Arial, sans-serif; fill: #475569; }
      .group-label { font: 700 18px Arial, sans-serif; fill: #0f4c81; }
      .chip { fill: #eef4ff; stroke: #111827; stroke-width: 3; rx: 10; ry: 10; }
      .chip-text { font: 700 12px Arial, sans-serif; fill: #0f4c81; }
      .linkbox { fill: #eef4ff; stroke: #111827; stroke-width: 4; rx: 10; ry: 10; }
      .linktext { font: 700 13px Arial, sans-serif; fill: #0f4c81; text-decoration: underline; }
      .note { font: 700 18px Arial, sans-serif; fill: #111827; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1520" height="980" />
  <rect class="frame" x="18" y="18" width="1484" height="944" />

  <text class="title" x="56" y="72">Updated understanding</text>
  <text class="small" x="56" y="102">Only iCargo, icargo_customer, and parcel-api are grouped. All others are independent projects.</text>

  <text class="group-label" x="120" y="150">iCargo related group</text>
  <rect class="group" x="90" y="170" width="1330" height="220" />

  <g id="icargo-card">
    <rect class="card" x="120" y="205" width="520" height="150" />
    <text class="title" x="380" y="255" text-anchor="middle">iCargo</text>
    <text class="sub" x="380" y="284" text-anchor="middle">main product / internal operations dashboard</text>
    <rect class="chip" x="235" y="302" width="90" height="28" />
    <text class="chip-text" x="280" y="320" text-anchor="middle">AngularJS</text>
    <rect class="chip" x="338" y="302" width="54" height="28" />
    <text class="chip-text" x="365" y="320" text-anchor="middle">PHP</text>
    <rect class="chip" x="405" y="302" width="70" height="28" />
    <text class="chip-text" x="440" y="320" text-anchor="middle">Ops UI</text>
    <a href="icargo.html" target="_top">
      <rect class="linkbox" x="438" y="220" width="150" height="34" />
      <text class="linktext" x="513" y="242" text-anchor="middle">detail page</text>
    </a>
  </g>

  <g id="icargo-customer-card">
    <rect class="card" x="690" y="205" width="360" height="150" />
    <text class="title" x="870" y="255" text-anchor="middle">icargo_customer</text>
    <text class="sub" x="870" y="284" text-anchor="middle">customer portal</text>
    <rect class="chip" x="770" y="302" width="84" height="28" />
    <text class="chip-text" x="812" y="320" text-anchor="middle">Zend MVC</text>
    <rect class="chip" x="866" y="302" width="54" height="28" />
    <text class="chip-text" x="893" y="320" text-anchor="middle">PHP</text>
    <rect class="chip" x="932" y="302" width="74" height="28" />
    <text class="chip-text" x="969" y="320" text-anchor="middle">Portal</text>
    <a href="icargo-customer.html" target="_top">
      <rect class="linkbox" x="818" y="220" width="104" height="34" />
      <text class="linktext" x="870" y="242" text-anchor="middle">detail page</text>
    </a>
  </g>

  <g id="parcel-api-card">
    <rect class="card" x="1100" y="205" width="280" height="150" />
    <text class="title" x="1240" y="255" text-anchor="middle">parcel-api</text>
    <text class="sub" x="1240" y="284" text-anchor="middle">shared backend</text>
    <rect class="chip" x="1158" y="302" width="46" height="28" />
    <text class="chip-text" x="1181" y="320" text-anchor="middle">PHP</text>
    <rect class="chip" x="1216" y="302" width="62" height="28" />
    <text class="chip-text" x="1247" y="320" text-anchor="middle">Redis</text>
    <rect class="chip" x="1290" y="302" width="72" height="28" />
    <text class="chip-text" x="1326" y="320" text-anchor="middle">APIs</text>
    <a href="parcel-api.html" target="_top">
      <rect class="linkbox" x="1188" y="220" width="104" height="34" />
      <text class="linktext" x="1240" y="242" text-anchor="middle">detail page</text>
    </a>
  </g>

  <path class="line" d="M640 280 L690 280" />
  <path class="line" d="M1050 280 L1100 280" />

  <text class="group-label" x="120" y="455">Independent projects</text>

  <g id="route-manager-card">
    <rect class="card" x="90" y="480" width="260" height="195" />
    <text class="title" x="220" y="538" text-anchor="middle">route manager</text>
    <text class="small" x="220" y="568" text-anchor="middle">independent project</text>
    <rect class="chip" x="138" y="592" width="86" height="28" />
    <text class="chip-text" x="181" y="610" text-anchor="middle">Next.js</text>
    <rect class="chip" x="234" y="592" width="72" height="28" />
    <text class="chip-text" x="270" y="610" text-anchor="middle">Redux</text>
    <rect class="chip" x="165" y="628" width="94" height="28" />
    <text class="chip-text" x="212" y="646" text-anchor="middle">Mapbox</text>
    <a href="route-manager.html" target="_top">
      <rect class="linkbox" x="150" y="640" width="140" height="28" />
      <text class="linktext" x="220" y="658" text-anchor="middle">detail page</text>
    </a>
  </g>

  <g id="inventory-card">
