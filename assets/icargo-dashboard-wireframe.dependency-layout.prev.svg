  <g id="bagging-card">
    <rect class="card" x="990" y="480" width="260" height="195" />
    <text class="title" x="1120" y="538" text-anchor="middle">bagging</text>
    <text class="small" x="1120" y="568" text-anchor="middle">independent project</text>
    <rect class="chip" x="1032" y="592" width="86" height="28" />
    <text class="chip-text" x="1075" y="610" text-anchor="middle">Next.js</text>
    <rect class="chip" x="1128" y="592" width="102" height="28" />
    <text class="chip-text" x="1179" y="610" text-anchor="middle">TypeScript</text>
    <rect class="chip" x="1076" y="628" width="88" height="28" />
    <text class="chip-text" x="1120" y="646" text-anchor="middle">Sequelize</text>
    <a href="bagging.html" target="_top">
      <rect class="linkbox" x="1050" y="640" width="140" height="28" />
      <text class="linktext" x="1120" y="658" text-anchor="middle">detail page</text>
    </a>
  </g>

  <g id="linnworks-card">
    <rect class="card" x="90" y="730" width="260" height="195" />
    <text class="title" x="220" y="788" text-anchor="middle">linnworks</text>
    <text class="small" x="220" y="818" text-anchor="middle">independent project</text>
    <rect class="chip" x="138" y="842" width="82" height="28" />
    <text class="chip-text" x="179" y="860" text-anchor="middle">NestJS</text>
    <rect class="chip" x="230" y="842" width="104" height="28" />
    <text class="chip-text" x="282" y="860" text-anchor="middle">TypeORM</text>
    <rect class="chip" x="186" y="878" width="66" height="28" />
    <text class="chip-text" x="219" y="896" text-anchor="middle">MySQL</text>
    <a href="linnworks.html" target="_top">
      <rect class="linkbox" x="150" y="890" width="140" height="28" />
      <text class="linktext" x="220" y="908" text-anchor="middle">detail page</text>
    </a>
  </g>

  <g id="webhook-worker-card">
    <rect class="card" x="390" y="730" width="260" height="195" />
    <text class="title" x="520" y="778" text-anchor="middle">webhook</text>
    <text class="title" x="520" y="810" text-anchor="middle">worker</text>
    <text class="small" x="520" y="838" text-anchor="middle">independent project</text>
    <rect class="chip" x="428" y="852" width="82" height="28" />
    <text class="chip-text" x="469" y="870" text-anchor="middle">NestJS</text>
    <rect class="chip" x="520" y="852" width="66" height="28" />
    <text class="chip-text" x="553" y="870" text-anchor="middle">Redis</text>
    <rect class="chip" x="470" y="888" width="100" height="28" />
    <text class="chip-text" x="520" y="906" text-anchor="middle">TypeORM</text>
    <a href="webhook-worker.html" target="_top">
