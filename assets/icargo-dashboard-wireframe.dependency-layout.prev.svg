    <text class="title" x="520" y="560" text-anchor="middle">management</text>
    <text class="small" x="520" y="588" text-anchor="middle">independent project</text>
    <rect class="chip" x="430" y="602" width="86" height="28" />
    <text class="chip-text" x="473" y="620" text-anchor="middle">Next.js</text>
    <rect class="chip" x="526" y="602" width="74" height="28" />
    <text class="chip-text" x="563" y="620" text-anchor="middle">Prisma</text>
    <rect class="chip" x="482" y="638" width="78" height="28" />
    <text class="chip-text" x="521" y="656" text-anchor="middle">Postgres</text>
    <a href="inventory-management.html" target="_top">
      <rect class="linkbox" x="450" y="640" width="140" height="28" />
      <text class="linktext" x="520" y="658" text-anchor="middle">detail page</text>
    </a>
  </g>

  <g id="onboarding-card">
    <rect class="card" x="690" y="480" width="260" height="195" />
    <text class="title" x="820" y="538" text-anchor="middle">onboarding</text>
    <text class="small" x="820" y="568" text-anchor="middle">independent project</text>
    <rect class="chip" x="742" y="592" width="86" height="28" />
    <text class="chip-text" x="785" y="610" text-anchor="middle">Next.js</text>
    <rect class="chip" x="838" y="592" width="78" height="28" />
    <text class="chip-text" x="877" y="610" text-anchor="middle">Sequelize</text>
    <rect class="chip" x="766" y="628" width="108" height="28" />
    <text class="chip-text" x="820" y="646" text-anchor="middle">Workflow UI</text>
    <a href="onboarding.html" target="_top">
      <rect class="linkbox" x="750" y="640" width="140" height="28" />
      <text class="linktext" x="820" y="658" text-anchor="middle">detail page</text>
    </a>
