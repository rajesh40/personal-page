  <path class="dashed-line" d="M1056 300 C1160 360, 1250 430, 1340 500" />
  <path class="dashed-line" d="M984 374 C1100 520, 1240 620, 1340 760" />

  <rect class="legend" x="750" y="770" width="430" height="140" />
  <text class="legend-title" x="772" y="804">Legend</text>
  <path class="solid-line" d="M780 836 L860 836" />
  <text class="hint" x="878" y="841">same product family / grouped together</text>
  <path class="dashed-line" d="M780 874 L860 874" />
  <text class="hint" x="878" y="879">dependency or integration, not ownership</text>
  <text class="hint" x="772" y="908">From jbo notes: linnworks and webhook-worker are separate projects but still interact with parcel-api.</text>

  <text class="note" x="748" y="958">If this looks right, the next HTML dashboard should copy this exact grouping and relationship style.</text>
</svg>
