<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 1040" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio dashboard wireframe with grouped products and dependency lines</title>
  <desc id="desc">Wireframe showing iCargo, icargo_customer, and parcel-api in one product ecosystem cluster, with independent projects outside that cluster. Dashed lines show dependency or integration with parcel-api where supported by the project notes.</desc>
  <defs>
    <style>
      .bg { fill: #fbfcff; }
      .frame { fill: none; stroke: #111827; stroke-width: 10; }
      .group { fill: #f7f9fc; stroke: #111827; stroke-width: 8; rx: 24; ry: 24; }
      .card { fill: #ffffff; stroke: #111827; stroke-width: 7; rx: 18; ry: 18; }
      .solid-line { stroke: #111827; stroke-width: 5; fill: none; stroke-linecap: round; }
      .dashed-line { stroke: #0f4c81; stroke-width: 5; fill: none; stroke-linecap: round; stroke-dasharray: 14 12; }
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .sub { font: 600 18px Arial, sans-serif; fill: #111827; }
      .small { font: 600 15px Arial, sans-serif; fill: #475569; }
      .group-label { font: 700 18px Arial, sans-serif; fill: #0f4c81; }
      .legend-title { font: 700 16px Arial, sans-serif; fill: #111827; }
      .chip { fill: #eef4ff; stroke: #111827; stroke-width: 3; rx: 10; ry: 10; }
      .chip-text { font: 700 12px Arial, sans-serif; fill: #0f4c81; }
      .linkbox { fill: #eef4ff; stroke: #111827; stroke-width: 4; rx: 10; ry: 10; }
      .linktext { font: 700 13px Arial, sans-serif; fill: #0f4c81; text-decoration: underline; }
      .legend { fill: #ffffff; stroke: #111827; stroke-width: 6; rx: 16; ry: 16; }
      .note { font: 700 18px Arial, sans-serif; fill: #111827; }
      .hint { font: 600 14px Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1560" height="1040" />
  <rect class="frame" x="18" y="18" width="1524" height="1004" />

  <text class="title" x="56" y="72">Corrected grouping with dependency lines</text>
  <text class="small" x="56" y="102">Grouped together only if they belong to the same product family. Dashed lines show dependency or integration, not ownership.</text>

  <text class="group-label" x="112" y="150">iCargo ecosystem</text>
  <rect class="group" x="86" y="170" width="1000" height="250" />

  <g id="icargo-card">
    <rect class="card" x="118" y="214" width="420" height="160" />
    <text class="title" x="328" y="266" text-anchor="middle">iCargo</text>
    <text class="sub" x="328" y="296" text-anchor="middle">main product / internal operations dashboard</text>
    <rect class="chip" x="196" y="314" width="90" height="28" />
    <text class="chip-text" x="241" y="332" text-anchor="middle">AngularJS</text>
    <rect class="chip" x="298" y="314" width="54" height="28" />
    <text class="chip-text" x="325" y="332" text-anchor="middle">PHP</text>
    <rect class="chip" x="364" y="314" width="82" height="28" />
    <text class="chip-text" x="405" y="332" text-anchor="middle">Ops UI</text>
    <a href="icargo.html" target="_top">
      <rect class="linkbox" x="388" y="228" width="120" height="34" />
      <text class="linktext" x="448" y="250" text-anchor="middle">detail page</text>
    </a>
  </g>

  <g id="icargo-customer-card">
    <rect class="card" x="566" y="214" width="270" height="160" />
    <text class="title" x="701" y="266" text-anchor="middle">icargo_customer</text>
    <text class="sub" x="701" y="296" text-anchor="middle">customer portal</text>
    <rect class="chip" x="627" y="314" width="84" height="28" />
    <text class="chip-text" x="669" y="332" text-anchor="middle">Zend MVC</text>
    <rect class="chip" x="721" y="314" width="54" height="28" />
    <text class="chip-text" x="748" y="332" text-anchor="middle">PHP</text>
    <a href="icargo-customer.html" target="_top">
      <rect class="linkbox" x="652" y="228" width="98" height="34" />
      <text class="linktext" x="701" y="250" text-anchor="middle">detail page</text>
    </a>
  </g>

  <g id="parcel-api-card">
    <rect class="card" x="866" y="214" width="190" height="160" />
    <text class="title" x="961" y="266" text-anchor="middle">parcel-api</text>
    <text class="sub" x="961" y="296" text-anchor="middle">shared backend</text>
    <rect class="chip" x="900" y="314" width="46" height="28" />
    <text class="chip-text" x="923" y="332" text-anchor="middle">PHP</text>
    <rect class="chip" x="956" y="314" width="60" height="28" />
    <text class="chip-text" x="986" y="332" text-anchor="middle">Redis</text>
    <a href="parcel-api.html" target="_top">
      <rect class="linkbox" x="906" y="228" width="110" height="34" />
      <text class="linktext" x="961" y="250" text-anchor="middle">detail page</text>
    </a>
  </g>

  <path class="solid-line" d="M538 294 L566 294" />
  <path class="solid-line" d="M836 294 L866 294" />

  <text class="group-label" x="112" y="480">Independent projects</text>

  <g id="route-manager-card">
    <rect class="card" x="86" y="500" width="260" height="200" />
    <text class="title" x="216" y="558" text-anchor="middle">route manager</text>
    <text class="small" x="216" y="588" text-anchor="middle">independent project</text>
    <rect class="chip" x="134" y="612" width="86" height="28" />
    <text class="chip-text" x="177" y="630" text-anchor="middle">Next.js</text>
    <rect class="chip" x="230" y="612" width="72" height="28" />
    <text class="chip-text" x="266" y="630" text-anchor="middle">Redux</text>
    <rect class="chip" x="160" y="648" width="94" height="28" />
    <text class="chip-text" x="207" y="666" text-anchor="middle">Mapbox</text>
    <a href="route-manager.html" target="_top">
      <rect class="linkbox" x="146" y="658" width="140" height="28" />
      <text class="linktext" x="216" y="676" text-anchor="middle">detail page</text>
    </a>
  </g>

  <g id="inventory-card">
    <rect class="card" x="382" y="500" width="260" height="200" />
    <text class="title" x="512" y="548" text-anchor="middle">inventory</text>
    <text class="title" x="512" y="580" text-anchor="middle">management</text>
    <text class="small" x="512" y="608" text-anchor="middle">independent project</text>
    <rect class="chip" x="422" y="622" width="86" height="28" />
    <text class="chip-text" x="465" y="640" text-anchor="middle">Next.js</text>
    <rect class="chip" x="518" y="622" width="74" height="28" />
    <text class="chip-text" x="555" y="640" text-anchor="middle">Prisma</text>
    <rect class="chip" x="476" y="658" width="78" height="28" />
    <text class="chip-text" x="515" y="676" text-anchor="middle">Postgres</text>
    <a href="inventory-management.html" target="_top">
      <rect class="linkbox" x="442" y="658" width="140" height="28" />
      <text class="linktext" x="512" y="676" text-anchor="middle">detail page</text>
    </a>
  </g>

  <g id="onboarding-card">
    <rect class="card" x="678" y="500" width="260" height="200" />
    <text class="title" x="808" y="558" text-anchor="middle">onboarding</text>
    <text class="small" x="808" y="588" text-anchor="middle">independent project</text>
    <rect class="chip" x="730" y="612" width="86" height="28" />
    <text class="chip-text" x="773" y="630" text-anchor="middle">Next.js</text>
    <rect class="chip" x="826" y="612" width="78" height="28" />
    <text class="chip-text" x="865" y="630" text-anchor="middle">Sequelize</text>
    <rect class="chip" x="754" y="648" width="108" height="28" />
    <text class="chip-text" x="808" y="666" text-anchor="middle">Workflow UI</text>
    <a href="onboarding.html" target="_top">
      <rect class="linkbox" x="738" y="658" width="140" height="28" />
      <text class="linktext" x="808" y="676" text-anchor="middle">detail page</text>
    </a>
  </g>

  <g id="bagging-card">
    <rect class="card" x="974" y="500" width="260" height="200" />
    <text class="title" x="1104" y="558" text-anchor="middle">bagging</text>
    <text class="small" x="1104" y="588" text-anchor="middle">independent project</text>
    <rect class="chip" x="1018" y="612" width="86" height="28" />
    <text class="chip-text" x="1061" y="630" text-anchor="middle">Next.js</text>
    <rect class="chip" x="1114" y="612" width="102" height="28" />
    <text class="chip-text" x="1165" y="630" text-anchor="middle">TypeScript</text>
    <rect class="chip" x="1060" y="648" width="90" height="28" />
    <text class="chip-text" x="1105" y="666" text-anchor="middle">Sequelize</text>
    <a href="bagging.html" target="_top">
      <rect class="linkbox" x="1034" y="658" width="140" height="28" />
      <text class="linktext" x="1104" y="676" text-anchor="middle">detail page</text>
    </a>
  </g>

  <g id="linnworks-card">
    <rect class="card" x="1270" y="500" width="214" height="200" />
    <text class="title" x="1377" y="558" text-anchor="middle">linnworks</text>
    <text class="small" x="1377" y="588" text-anchor="middle">independent project</text>
    <rect class="chip" x="1308" y="612" width="82" height="28" />
    <text class="chip-text" x="1349" y="630" text-anchor="middle">NestJS</text>
    <rect class="chip" x="1400" y="612" width="70" height="28" />
    <text class="chip-text" x="1435" y="630" text-anchor="middle">MySQL</text>
    <rect class="chip" x="1331" y="648" width="92" height="28" />
    <text class="chip-text" x="1377" y="666" text-anchor="middle">TypeORM</text>
    <a href="linnworks.html" target="_top">
      <rect class="linkbox" x="1307" y="658" width="140" height="28" />
      <text class="linktext" x="1377" y="676" text-anchor="middle">detail page</text>
    </a>
  </g>

  <g id="webhook-worker-card">
    <rect class="card" x="1270" y="760" width="214" height="200" />
    <text class="title" x="1377" y="808" text-anchor="middle">webhook</text>
    <text class="title" x="1377" y="840" text-anchor="middle">worker</text>
    <text class="small" x="1377" y="868" text-anchor="middle">independent project</text>
    <rect class="chip" x="1308" y="882" width="82" height="28" />
    <text class="chip-text" x="1349" y="900" text-anchor="middle">NestJS</text>
    <rect class="chip" x="1400" y="882" width="66" height="28" />
    <text class="chip-text" x="1433" y="900" text-anchor="middle">Redis</text>
    <rect class="chip" x="1331" y="918" width="92" height="28" />
    <text class="chip-text" x="1377" y="936" text-anchor="middle">TypeORM</text>
    <a href="webhook-worker.html" target="_top">
      <rect class="linkbox" x="1307" y="918" width="140" height="28" />
      <text class="linktext" x="1377" y="936" text-anchor="middle">detail page</text>
    </a>
