<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1020" role="img" aria-labelledby="title desc">
  <title id="title">iCargo dashboard wireframe with tech and detail links on each project card</title>
  <desc id="desc">Wireframe showing iCargo as the main product. Every project rectangle contains its name, tech labels, and a visible detail link.</desc>
  <defs>
    <style>
