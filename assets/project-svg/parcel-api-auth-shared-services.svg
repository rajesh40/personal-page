<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">parcel-api authentication and shared services</title>
  <desc id="desc">Detailed view of parcel-api as the shared backend platform handling authentication for both products and serving shared business modules.</desc>
  <defs>
    <style>
      .bg { fill: #f5f8ff; }
      .card { fill: #ffffff; stroke: #d7e1f2; stroke-width: 2; }
      .headBlue { fill: #1f5ca8; }
      .headGreen { fill: #12936a; }
      .headGold { fill: #d88614; }
      .headPurple { fill: #6b4aa8; }
      .headRed { fill: #bb4040; }
      .title { font: 700 28px Arial, sans-serif; fill: #1d2b4f; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #5d6d8c; }
      .section { font: 700 22px Arial, sans-serif; fill: #1d2b4f; }
      .body { font: 600 15px Arial, sans-serif; fill: #23304f; }
      .small { font: 400 14px Arial, sans-serif; fill: #46556f; }
      .chip { font: 700 12px Arial, sans-serif; fill: #ffffff; }
      .arrow { stroke: #2a5db0; stroke-width: 5; fill: none; marker-end: url(#arrowHead); }
    </style>
    <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2a5db0"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="980" rx="28"/>
  <rect class="card" x="24" y="24" width="1352" height="932" rx="24"/>

  <text class="title" x="60" y="78">parcel-api: Shared Authentication And Business Services</text>
  <text class="subtitle" x="60" y="108">This view focuses on parcel-api itself: two product surfaces authenticate through it, and the same backend modules are reused across internal and customer-facing workflows.</text>

  <rect class="card" x="70" y="150" width="320" height="190" rx="22"/>
  <rect class="headBlue" x="70" y="150" width="320" height="52" rx="22"/>
  <text class="chip" x="94" y="182">PRODUCT SURFACE 1</text>
  <text class="section" x="98" y="240">iCargo</text>
  <text class="small" x="98" y="280">• internal operations product</text>
  <text class="small" x="98" y="308">• calls `/login` and later many API actions</text>

  <rect class="card" x="1010" y="150" width="320" height="190" rx="22"/>
  <rect class="headGreen" x="1010" y="150" width="320" height="52" rx="22"/>
  <text class="chip" x="1034" y="182">PRODUCT SURFACE 2</text>
  <text class="section" x="1038" y="240">iCargo Customer</text>
  <text class="small" x="1038" y="280">• customer self-service portal</text>
  <text class="small" x="1038" y="308">• uses `/custLogin` and token-backed requests</text>

  <rect class="card" x="446" y="140" width="508" height="254" rx="24"/>
  <rect class="headGold" x="446" y="140" width="508" height="56" rx="24"/>
  <text class="chip" x="470" y="174">AUTHENTICATION CORE</text>
  <text class="section" x="476" y="242">parcel-api Auth Layer</text>
  <text class="small" x="476" y="282">• `/login` for internal users and `/custLogin` for customer users</text>
  <text class="small" x="476" y="310">• Firebase auth verification for credentials</text>
  <text class="small" x="476" y="338">• `Authentication::process(...)` creates encoded access token</text>
  <text class="small" x="476" y="366">• token is stored against the user record</text>
  <text class="small" x="476" y="394">• response includes company, warehouse, role, menu, and rate context</text>

  <path class="arrow" d="M390 244 L446 244"/>
  <path class="arrow" d="M1010 244 L954 244"/>
  <text class="small" x="398" y="226">`/login`</text>
  <text class="small" x="964" y="226">`/custLogin`</text>

  <path class="arrow" d="M700 394 L700 470"/>
  <text class="small" x="728" y="438">authenticated request context</text>

  <rect class="card" x="70" y="486" width="1260" height="320" rx="24"/>
  <rect class="headPurple" x="70" y="486" width="1260" height="56" rx="24"/>
  <text class="chip" x="96" y="520">SHARED BUSINESS MODULES INSIDE PARCEL-API</text>

  <rect class="card" x="96" y="576" width="220" height="174" rx="20"/>
  <text class="section" x="118" y="624">Booking</text>
  <text class="small" x="118" y="662">• save shipment</text>
  <text class="small" x="118" y="690">• carrier and service flows</text>
  <text class="small" x="118" y="718">• downstream booking logic</text>

  <rect class="card" x="340" y="576" width="220" height="174" rx="20"/>
  <text class="section" x="364" y="624">Pricing</text>
  <text class="small" x="364" y="662">• get shipment prices</text>
  <text class="small" x="364" y="690">• rate engine and service checks</text>
  <text class="small" x="364" y="718">• customer and carrier rules</text>

  <rect class="card" x="584" y="576" width="220" height="174" rx="20"/>
  <text class="section" x="606" y="624">Route And Shipment</text>
  <text class="small" x="606" y="662">• get prepared route</text>
  <text class="small" x="606" y="690">• load shipments</text>
  <text class="small" x="606" y="718">• save and assign route</text>

  <rect class="card" x="828" y="576" width="220" height="174" rx="20"/>
  <text class="section" x="852" y="624">Orders And Channels</text>
  <text class="small" x="852" y="662">• fetch shop credentials</text>
  <text class="small" x="852" y="690">• fetch meta orders and orders</text>
  <text class="small" x="852" y="718">• Shopify, Woo, eBay, OnBuy, others</text>

  <rect class="card" x="1072" y="576" width="232" height="174" rx="20"/>
  <text class="section" x="1094" y="624">Customer Settings</text>
  <text class="small" x="1094" y="662">• webhooks list, create, update, test</text>
  <text class="small" x="1094" y="690">• user settings and tracking toggles</text>
  <text class="small" x="1094" y="718">• shared config APIs</text>

  <rect class="card" x="204" y="840" width="992" height="78" rx="20"/>
  <rect class="headRed" x="204" y="840" width="992" height="32" rx="20"/>
  <text class="chip" x="228" y="862">WHY THIS MATTERS</text>
  <text class="body" x="230" y="902">One backend platform handled auth, role and warehouse context, and the shared business modules reused by both products. That is the architectural reason `parcel-api` is one of the strongest core-platform stories in the whole system.</text>
</svg>
