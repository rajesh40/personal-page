<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">Route Manager UI Overview</title>
  <desc id="desc">Conceptual dashboard view for the route-planner module showing filters, map, route lists, and optimization drawer.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6f8ff"/>
      <stop offset="100%" stop-color="#eef3ff"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fbfcff"/>
    </linearGradient>
    <linearGradient id="mapbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef6f4"/>
      <stop offset="100%" stop-color="#f9fcff"/>
    </linearGradient>
    <style>
      .title { font: 700 36px 'Segoe UI', Arial, sans-serif; fill: #13213d; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #5a6e8c; }
      .app-title { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .section { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #163254; }
      .meta { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #5a7091; letter-spacing: 0.7px; }
      .body { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #2c3e5b; }
      .small { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #60718d; }
      .tiny { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #637492; }
      .button { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .button-alt { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #21418a; }
      .badge { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .chip { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #2450b8; }
    </style>
  </defs>

  <rect width="1600" height="1120" fill="url(#bg)"/>
  <rect x="28" y="24" width="1544" height="1072" rx="28" fill="#ffffff" stroke="#d9e4f4"/>
  <text x="70" y="86" class="title">Route Manager Revamp: Graphical UI View</text>
  <text x="70" y="118" class="subtitle">A route-planner dashboard view focused only on the route-manager module: filters, live map, route lists, and optimization controls.</text>

  <rect x="70" y="168" width="1460" height="896" rx="26" fill="url(#chrome)" stroke="#d9e4f4"/>
  <rect x="70" y="168" width="1460" height="72" rx="26" fill="#204f95"/>
  <text x="108" y="213" class="app-title">Route Planner Dashboard</text>

  <rect x="770" y="184" width="150" height="38" rx="10" fill="#ffffff" opacity="0.98"/>
  <text x="800" y="208" class="button-alt">Warehouse</text>
  <rect x="940" y="184" width="160" height="38" rx="10" fill="#ffffff" opacity="0.98"/>
  <text x="972" y="208" class="button-alt">28 Mar 2026</text>
  <rect x="1120" y="184" width="146" height="38" rx="10" fill="#13b778"/>
  <text x="1156" y="208" class="button">Live Updates</text>
  <rect x="1288" y="184" width="204" height="38" rx="10" fill="#ffffff" opacity="0.98"/>
  <text x="1322" y="208" class="button-alt">Driver GPS + MQTT</text>

  <g>
    <rect x="94" y="268" width="286" height="560" rx="22" fill="#f9fbff" stroke="#dde7f4"/>
    <circle cx="128" cy="304" r="22" fill="#204f95"/>
    <text x="121" y="311" class="badge">1</text>
    <text x="164" y="310" class="section">Filters</text>
    <text x="164" y="332" class="meta">SELECT SHIPMENTS FOR PLANNING</text>

    <text x="118" y="384" class="small">Warehouse</text>
    <rect x="118" y="394" width="238" height="44" rx="12" fill="#ffffff" stroke="#dce6f3"/>
    <text x="144" y="422" class="body">Northampton Hub</text>

    <text x="118" y="472" class="small">Date Range</text>
    <rect x="118" y="482" width="238" height="44" rx="12" fill="#ffffff" stroke="#dce6f3"/>
    <text x="144" y="510" class="body">28 Mar 2026 to 30 Mar 2026</text>

    <text x="118" y="560" class="small">Route Status</text>
    <rect x="118" y="574" width="104" height="32" rx="16" fill="#eef2ff" stroke="#d7defa"/>
    <text x="144" y="595" class="chip">UNASSIGNED</text>
    <rect x="234" y="574" width="68" height="32" rx="16" fill="#eef8f1" stroke="#cfead9"/>
    <text x="255" y="595" class="chip">SAVED</text>
    <rect x="118" y="618" width="86" height="32" rx="16" fill="#fff5e8" stroke="#f0dcc2"/>
    <text x="142" y="639" class="chip">ASSIGNED</text>
    <rect x="216" y="618" width="96" height="32" rx="16" fill="#fff0f2" stroke="#f0cdd4"/>
    <text x="238" y="639" class="chip">COMPLETED</text>

    <rect x="118" y="690" width="238" height="96" rx="16" fill="#ffffff" stroke="#dce6f3"/>
    <text x="142" y="724" class="section">Selection</text>
    <text x="142" y="752" class="body">23 shipments selected</text>
    <text x="142" y="776" class="small">Polygon and manual selection both supported</text>

    <rect x="118" y="806" width="114" height="40" rx="12" fill="#f6212b"/>
    <text x="142" y="832" class="button">OPTIMIZE</text>
    <rect x="242" y="806" width="114" height="40" rx="12" fill="#ffffff" stroke="#dce6f3"/>
    <text x="272" y="832" class="button-alt">CLEAR</text>
  </g>

  <g>
    <rect x="404" y="268" width="760" height="560" rx="22" fill="url(#mapbg)" stroke="#dbe6f3"/>
    <circle cx="438" cy="304" r="22" fill="#204f95"/>
    <text x="431" y="311" class="badge">2</text>
    <text x="474" y="310" class="section">Map View</text>
    <text x="474" y="332" class="meta">DROPS, ROUTES, DRIVER MOVEMENT, POLYGON SELECTION</text>

    <path d="M498 394 C620 360, 724 420, 844 382 C932 354, 1000 430, 1088 390" fill="none" stroke="#2f60e3" stroke-width="8" stroke-linecap="round"/>
    <path d="M508 470 C610 508, 700 460, 804 504 C880 536, 970 488, 1070 544" fill="none" stroke="#ff7c43" stroke-width="8" stroke-linecap="round"/>
    <path d="M552 598 C644 548, 748 610, 858 590 C938 576, 1010 642, 1088 618" fill="none" stroke="#13b778" stroke-width="8" stroke-linecap="round"/>

    <path d="M650 432 L720 404 L808 430 L772 506 L676 500 Z" fill="none" stroke="#6a56d8" stroke-width="4" stroke-dasharray="10 8"/>

    <circle cx="566" cy="412" r="18" fill="#204f95"/>
    <text x="559" y="419" class="badge">W</text>
    <text x="592" y="418" class="small">Warehouse</text>

    <g>
      <circle cx="664" cy="382" r="18" fill="#2f60e3"/><text x="658" y="389" class="badge">1</text>
      <circle cx="820" cy="384" r="18" fill="#2f60e3"/><text x="814" y="391" class="badge">2</text>
      <circle cx="986" cy="390" r="18" fill="#2f60e3"/><text x="980" y="397" class="badge">3</text>
      <circle cx="602" cy="498" r="18" fill="#ff7c43"/><text x="596" y="505" class="badge">4</text>
      <circle cx="786" cy="516" r="18" fill="#ff7c43"/><text x="780" y="523" class="badge">5</text>
      <circle cx="998" cy="552" r="18" fill="#ff7c43"/><text x="992" y="559" class="badge">6</text>
      <circle cx="744" cy="604" r="18" fill="#13b778"/><text x="738" y="611" class="badge">7</text>
      <circle cx="1032" cy="620" r="18" fill="#13b778"/><text x="1026" y="627" class="badge">8</text>
    </g>

    <rect x="460" y="706" width="186" height="42" rx="14" fill="#ffffff" stroke="#dce6f3"/>
    <text x="492" y="733" class="button-alt">Shipment Drops</text>
    <rect x="664" y="706" width="164" height="42" rx="14" fill="#ffffff" stroke="#dce6f3"/>
    <text x="698" y="733" class="button-alt">Driver GPS</text>
    <rect x="846" y="706" width="204" height="42" rx="14" fill="#ffffff" stroke="#dce6f3"/>
    <text x="878" y="733" class="button-alt">Polygon Selection</text>
  </g>

  <g>
    <rect x="1184" y="268" width="322" height="560" rx="22" fill="#f9fbff" stroke="#dde7f4"/>
    <circle cx="1218" cy="304" r="22" fill="#204f95"/>
    <text x="1211" y="311" class="badge">3</text>
    <text x="1254" y="310" class="section">Route Lists</text>
    <text x="1254" y="332" class="meta">UNASSIGNED, SAVED, ASSIGNED, COMPLETED</text>

    <rect x="1210" y="364" width="96" height="34" rx="12" fill="#eef2ff" stroke="#d7defa"/>
    <text x="1232" y="386" class="chip">UNASSIGNED</text>
    <rect x="1318" y="364" width="76" height="34" rx="12" fill="#eef8f1" stroke="#cfead9"/>
    <text x="1340" y="386" class="chip">SAVED</text>
    <rect x="1406" y="364" width="74" height="34" rx="12" fill="#fff5e8" stroke="#f0dcc2"/>
    <text x="1424" y="386" class="chip">LIVE</text>

    <rect x="1210" y="424" width="270" height="112" rx="16" fill="#ffffff" stroke="#dce6f3"/>
    <text x="1234" y="458" class="section">Unassigned</text>
    <text x="1234" y="486" class="body">281 shipments waiting</text>
    <text x="1234" y="510" class="small">Refresh, filter, or select for route optimization</text>

    <rect x="1210" y="556" width="270" height="120" rx="16" fill="#ffffff" stroke="#dce6f3"/>
    <text x="1234" y="590" class="section">Saved Route A12</text>
    <text x="1234" y="618" class="body">Driver: Ravi</text>
    <text x="1234" y="642" class="body">12 drops | ETA 09:30</text>
    <text x="1234" y="666" class="small">Open route details and assign or reschedule</text>

    <rect x="1210" y="696" width="270" height="100" rx="16" fill="#ffffff" stroke="#dce6f3"/>
    <text x="1234" y="730" class="section">Completed Route C04</text>
    <text x="1234" y="758" class="body">18 drops completed</text>
    <text x="1234" y="782" class="small">Review route history and shipment outcomes</text>
  </g>

  <g>
    <rect x="94" y="850" width="1412" height="182" rx="24" fill="#ffffff" stroke="#dce6f3"/>
    <circle cx="128" cy="892" r="22" fill="#204f95"/>
    <text x="121" y="899" class="badge">4</text>
    <text x="164" y="898" class="section">Optimization Drawer</text>
    <text x="164" y="920" class="meta">REVIEW DROPS, SAVE TEMP ROUTE, ASSIGN TO DRIVER</text>

    <rect x="164" y="948" width="154" height="44" rx="12" fill="#eef2ff" stroke="#d7defa"/>
    <text x="190" y="976" class="button-alt">Driving + Traffic</text>
    <rect x="336" y="948" width="170" height="44" rx="12" fill="#ffffff" stroke="#dce6f3"/>
    <text x="366" y="976" class="body">Start: Warehouse</text>
    <rect x="524" y="948" width="144" height="44" rx="12" fill="#ffffff" stroke="#dce6f3"/>
    <text x="554" y="976" class="body">End: Hub</text>
    <rect x="686" y="948" width="126" height="44" rx="12" fill="#ffffff" stroke="#dce6f3"/>
    <text x="720" y="976" class="body">Van</text>
    <rect x="830" y="948" width="176" height="44" rx="12" fill="#ffffff" stroke="#dce6f3"/>
    <text x="856" y="976" class="body">Temp Route #3812</text>

    <text x="1042" y="976" class="body">23 optimized drops ready for review</text>
    <rect x="1192" y="944" width="120" height="48" rx="14" fill="#ffffff" stroke="#dce6f3"/>
    <text x="1222" y="974" class="button-alt">Review</text>
    <rect x="1326" y="944" width="86" height="48" rx="14" fill="#13b778"/>
    <text x="1352" y="974" class="button">Save</text>
    <rect x="1424" y="944" width="82" height="48" rx="14" fill="#f6212b"/>
    <text x="1448" y="974" class="button">Assign</text>
  </g>
</svg>
